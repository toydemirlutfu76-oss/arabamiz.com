<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabamız | Güvenli Araç Kataloğu</title>
    <!-- Tailwind CSS ve FontAwesome Simgeleri -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Üst Menü / Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-black text-red-600 tracking-wider"><i class="fa-solid class=fa-car-side mr-2"></i>ARABAMIZ<span class="text-gray-700 text-sm font-semibold">.site</span></a>
            <button onclick="openModal()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-5 py-2.5 rounded-xl shadow-lg transition duration-200 flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Ücretsiz İlan Ver
            </button>
        </div>
    </nav>

    <!-- Ana Vitrin Alanı -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-extrabold mb-8 text-gray-900 border-b-4 border-red-600 inline-block pb-2">Güncel Araç İlanları</h1>
        
        <!-- Yükleniyor Uyarısı -->
        <div id="loading" class="text-center py-12">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-red-600 mb-2"></i>
            <p class="text-gray-500 font-medium">Bulut veritabanına bağlanılıyor...</p>
        </div>

        <!-- İlan Kartları Kutusu -->
        <div id="carGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            <!-- İlanlar Buraya Otomatik Gelecek -->
        </div>
    </main>

    <!-- İlan Ekleme Penceresi (Modal) -->
    <div id="uploadModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 hidden animate-fade-in">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-gray-900 flex items-center gap-2"><i class="fa-solid fa-car text-red-600"></i> Yeni İlan Detayları</h2>
            
            <form id="carForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Araç Başlığı</label>
                    <input type="text" id="title" required placeholder="Örn: Sahibinden Tertemiz Hatasız Golf" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Model Yılı</label>
                        <input type="number" id="year" required placeholder="Örn: 2018" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Fiyat (TL)</label>
                        <input type="number" id="price" required placeholder="Örn: 850000" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Kasa Tipi</label>
                        <input type="text" id="bodyType" required placeholder="Örn: Sedan" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Renk</label>
                        <input type="text" id="color" required placeholder="Örn: Beyaz" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Sahibi Kim?</label>
                    <input type="text" id="owner" required placeholder="Adınız Soyadınız" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Araba Fotoğraf Linki (URL)</label>
                    <input type="url" id="imageUrl" required placeholder="https://resimlinki.com/araba.jpg" class="w-full px-4 py-2.5 border rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
                    <p class="text-xs text-gray-400 mt-1">Telefonla eklerken internetten bulduğunuz bir resim linkini buraya yapıştırabilirsiniz kanka.</p>
                </div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200 mt-2">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i> İlanı Bulut Veritabanına Yükle
                </button>
            </form>
        </div>
    </div>

    <!-- FIREBASE VE VERİTABANI MOTORU -->
    <script type="module">
        // Kanka Firebase kütüphanelerini modül olarak çekiyoruz
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Senin Firebase'den aldığın o sihirli anahtarlar:
        const firebaseConfig = {
            apiKey: "AIzaSyDa8k6w5FgAVK1Ai8NYForyXC8fg4k_PzE",
            authDomain: "arabamiz-site.firebaseapp.com",
            projectId: "arabamiz-site",
            storageBucket: "arabamiz-site.firebasestorage.app",
            messagingSenderId: "511928130948",
            appId: "1:511928130948:web:dd3fef59e0b501fb0751d1",
            measurementId: "G-8T29WLBF8Z"
        };

        // Firebase ve Firestore'u Başlatıyoruz
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const carsCollection = collection(db, "cars");

        // Sayfa Açıldığında Buluttaki İlanları Çeken Fonksiyon
        async function fetchCars() {
            const loadingDiv = document.getElementById("loading");
            const carGrid = document.getElementById("carGrid");
            
            try {
                // İlanları son eklenenden ilk eklenene göre sıralı çekiyoruz
                const q = query(carsCollection, orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                carGrid.innerHTML = ""; // İçini temizle
                
                if (querySnapshot.empty) {
                    carGrid.innerHTML = `<p class="col-span-full text-center text-gray-500 font-medium py-8">Henüz bulutta ilan yok kanka. İlk ilanı sen ekle! 🚗</p>`;
                } else {
                    querySnapshot.forEach((doc) => {
                        const car = doc.data();
                        const carCard = `
                            <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 hover:shadow-xl transition duration-300">
                                <img src="${car.coverImage}" alt="${car.title}" class="w-full h-48 object-cover object-center bg-gray-200" onerror="this.src='https://images.unsplash.com/photo-1542282088-72c9c27ed0cd?w=500'">
                                <div class="p-5">
                                    <div class="flex justify-between items-start mb-2">
                                        <h3 class="text-xl font-bold text-gray-900 truncate max-w-[70%]">${car.title}</h3>
                                        <span class="text-sm bg-gray-100 text-gray-600 px-2 py-1 rounded-md font-semibold">${car.year}</span>
                                    </div>
                                    <p class="text-2xl font-black text-red-600 mb-4">${Number(car.price).toLocaleString('tr-TR')} TL</p>
                                    <div class="grid grid-cols-2 gap-y-2 text-sm text-gray-500 border-t pt-3 mb-1">
                                        <div><i class="fa-solid fa-car-side mr-1 text-gray-400"></i> ${car.bodyType}</div>
                                        <div><i class="fa-solid fa-palette mr-1 text-gray-400"></i> ${car.color}</div>
                                        <div class="col-span-2 text-xs font-semibold text-gray-400 mt-1"><i class="fa-solid fa-user mr-1"></i> İlan Sahibi: ${car.owner}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                        carGrid.innerHTML += carCard;
                    });
                }
            } catch (error) {
                console.error("Veri çekme hatası kanka: ", error);
                carGrid.innerHTML = `<p class="col-span-full text-center text-red-500 font-medium py-8">Bulut bağlantı hatası oluştu!</p>`;
            } finally {
                loadingDiv.classList.add("hidden");
                carGrid.classList.remove("hidden");
            }
        }

        // Form Gönderildiğinde Buluta Yeni İlan Ekleyen Fonksiyon
        document.getElementById("carForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const newCar = {
                title: document.getElementById("title").value,
                year: document.getElementById("year").value,
                price: document.getElementById("price").value,
                bodyType: document.getElementById("bodyType").value,
                color: document.getElementById("color").value,
                owner: document.getElementById("owner").value,
                coverImage: document.getElementById("imageUrl").value,
                createdAt: new Date().getTime() // Sıralama için zaman damgası
            };

            try {
                // Firebase Firestore'a ekleme yapıyoruz kanka
                await addDoc(carsCollection, newCar);
                document.getElementById("carForm").reset();
                window.closeModal();
                // Sayfayı yenilemeden buluttan yeni verileri tekrar çek
                fetchCars();
                alert("İlan bulut veritabanına başarıyla kaydedildi kanka! 🚀");
            } catch (error) {
                console.error("Buluta veri yazma hatası kanka: ", error);
                alert("İlan eklenirken bir hata oluştu! Konsolu kontrol et kanka.");
            }
        });

        // Sayfa ilk yüklendiğinde ilanları getir
        window.addEventListener("DOMContentLoaded", fetchCars);
    </script>

    <!-- Modal Açma Kapatma Fonksiyonları -->
    <script>
        function openModal() {
            document.getElementById("uploadModal").classList.remove("hidden");
            document.body.style.overflow = "hidden";
        }
        function closeModal() {
            document.getElementById("uploadModal").classList.add("hidden");
            document.body.style.overflow = "auto";
        }
        // Fonksiyonları dışarıdan çağrılabilmesi için window nesnesine bağlıyoruz
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
